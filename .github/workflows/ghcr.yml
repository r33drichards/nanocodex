name: build and push to ghcr

# main pushes publish `latest` + `<sha>`; pull requests publish the same
# images under `pr-<number>` + `<sha>` tags and get a sticky PR comment with
# the pullable references. Fork PRs are skipped (no ghcr write access).
#
# Builds are minimal: a `changes` job maps changed paths to the images they
# feed, and only those images are (re)built. Unchanged images keep their
# previous tags (`latest`/`pr-N` simply don't advance for them). Every image
# is a nix flake attr — the flake is the single source of truth (no
# Dockerfiles).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Map changed paths -> images to rebuild. workflow_dispatch rebuilds all.
  changes:
    # PR builds need to push to ghcr, which fork PRs' tokens can't do.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      attrs: ${{ steps.plan.outputs.attrs }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'flake.nix'
              - 'flake.lock'
              - 'codex-home/**'
              - 'policies/**'
              - '.github/workflows/ghcr.yml'
            client:
              - 'client/**'
            frontend:
              - 'frontend/**'
            slackbot:
              - 'slackbot/**'
            languages:
              - 'languages/**'

      - name: plan builds
        id: plan
        env:
          CORE: ${{ steps.filter.outputs.core }}
          CLIENT: ${{ steps.filter.outputs.client }}
          FRONTEND: ${{ steps.filter.outputs.frontend }}
          SLACKBOT: ${{ steps.filter.outputs.slackbot }}
          LANGUAGES: ${{ steps.filter.outputs.languages }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CORE=true CLIENT=true FRONTEND=true SLACKBOT=true LANGUAGES=true
          fi
          # attr -> rebuild condition (rootfs/flake feed everything; the
          # bridge (client/) is in every supervisord image; frontend,
          # slackbot and the language engines only in their variants).
          declare -A want=()
          [ "$CORE" = true ] && for a in image languages standalone standalone-frontend standalone-slack standalone-full slack-remote standalone-languages; do want[$a]=1; done
          [ "$CLIENT" = true ] && for a in standalone standalone-frontend standalone-slack standalone-full slack-remote standalone-languages; do want[$a]=1; done
          [ "$FRONTEND" = true ] && for a in standalone-frontend standalone-full standalone-languages; do want[$a]=1; done
          [ "$SLACKBOT" = true ] && for a in standalone-slack standalone-full slack-remote; do want[$a]=1; done
          [ "$LANGUAGES" = true ] && for a in languages standalone-languages; do want[$a]=1; done
          attrs=$(for a in image languages standalone standalone-frontend standalone-slack standalone-full slack-remote standalone-languages; do
            [ -n "${want[$a]:-}" ] && echo "$a"; done | jq -R . | jq -sc .)
          echo "attrs=$attrs" | tee -a "$GITHUB_OUTPUT"

  # Build every requested attr ONCE per arch and save the nix store cache.
  # One job per arch: build every requested attr AND push it, in the same job.
  # The Rust workspaces (codex, mcp-v8) compile once into the local nix store
  # and every image reuses those store paths — no cross-job cache handoff to
  # miss. (The earlier compile+push split rebuilt everything in each push leg:
  # the store far exceeds the 4.5 GB cache cap, so the pre-save GC evicted the
  # very derivations the push legs needed.) The nix cache here is only a
  # cross-RUN warm start; within a run nothing is rebuilt twice.
  build:
    needs: changes
    if: needs.changes.outputs.attrs != '[]'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # Two full Rust workspaces compile in the nix store; stock runners run
      # out of disk without this.
      - name: free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache /usr/share/dotnet /opt/ghc
          df -h /

      - uses: DeterminateSystems/nix-installer-action@v16
        with:
          # Pull prebuilt store paths from the project's attic binary cache
          # (self-hosted on Railway) so a warm cache turns the cold Rust
          # compile into a download. Public cache — no auth needed to pull.
          extra-conf: |
            extra-substituters = https://attic-cache-production.up.railway.app/nanocodex
            extra-trusted-public-keys = nanocodex:wvR6YvGpPY8g9uQPQv+rW7hu1toPFf7Oo0MEQNtjy7A=

      # Cross-run /nix/store cache: on a flake.lock hit the Rust builds are
      # skipped and the run is just image assembly + push. Keyed on flake.lock
      # (a stable content key), restoring the newest cache for this lock then
      # any for this arch. The two arches share the repo's 10 GB budget, so cap
      # each store at ~4.5 GB on save; this cap does NOT affect the current run
      # (everything is already built locally before the post-save GC runs).
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ matrix.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ matrix.arch }}-
          gc-max-store-size-linux: 4500M
          purge: true
          purge-prefixes: nix-${{ matrix.arch }}-
          purge-created: 0
          purge-primary-key: never

      # Upload newly-built store paths to the attic cache in the BACKGROUND
      # (watch-store), so the upload overlaps the build instead of being a
      # blocking final step. Runs after the store cache is restored so the
      # attic client install is a cache hit. Never fails the job; skips on
      # fork PRs (no secret).
      - name: attic cache — background uploader (non-blocking)
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          if [ -z "${ATTIC_TOKEN:-}" ]; then
            echo "::notice::ATTIC_TOKEN unset — cache upload disabled (pull still works)"
            exit 0
          fi
          nix profile install github:zhaofengli/attic#attic-client
          attic login ci https://attic-cache-production.up.railway.app "$ATTIC_TOKEN"
          nohup attic watch-store ci:nanocodex >/tmp/attic-watch.log 2>&1 &
          echo "attic watch-store started (PID $!) — uploading store paths as they build"

      - name: nix build + push all requested images (skopeo)
        run: |
          # The runner ships a v1-format /etc/containers/registries.conf that
          # nix's skopeo refuses to parse — point it at a minimal v2 one, and
          # use --dest-creds instead of a login step (no auth-file handling).
          echo 'unqualified-search-registries = ["docker.io"]' > /tmp/registries.conf
          for attr in $(echo '${{ needs.changes.outputs.attrs }}' | jq -r '.[]'); do
            if [ "$attr" = image ]; then img="${IMAGE}"; else img="${IMAGE}-${attr}"; fi
            nix build ".#${attr}" --print-build-logs
            # streamLayeredImage output is a script that writes a docker-archive
            # tar to stdout; docker-archive sources must be seekable, so land it
            # in a file first, and delete it after pushing (the tars are large).
            ./result > /tmp/nanocodex-image.tar
            nix run nixpkgs#skopeo -- --registries-conf /tmp/registries.conf \
              copy --insecure-policy \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              docker-archive:/tmp/nanocodex-image.tar \
              "docker://${img}:${{ github.sha }}-${{ matrix.arch }}"
            rm -f /tmp/nanocodex-image.tar
            df -h /
          done

  manifest:
    needs: [changes, build]
    runs-on: ubuntu-latest
    steps:
      - name: assemble and push multi-arch manifest
        run: |
          # main: latest + sha; PR: pr-<n> (mutable, tracks the PR) + sha.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            tags="pr-${{ github.event.number }} ${{ github.sha }}"
          else
            tags="latest ${{ github.sha }}"
          fi
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          for attr in $(echo '${{ needs.changes.outputs.attrs }}' | jq -r '.[]'); do
            if [ "$attr" = image ]; then suffix=""; else suffix="-${attr}"; fi
            for tag in $tags; do
              podman manifest create "${IMAGE}${suffix}:${tag}"
              podman manifest add "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${{ github.sha }}-amd64"
              podman manifest add "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${{ github.sha }}-arm64"
              podman manifest push --all "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${tag}"
            done
          done

  # Sticky PR comment listing the images this PR's latest push rebuilt
  # (updated in place on every push).
  pr-comment:
    if: ${{ always() && github.event_name == 'pull_request' && needs.changes.result == 'success' && !failure() && !cancelled() }}
    needs: [changes, manifest]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- ghcr-pr-image-builds -->";
            const pr = context.issue.number;
            const sha = context.sha; // the PR's merge commit — what the jobs built
            const base = `ghcr.io/${context.repo.owner}/${context.repo.repo}`;
            const attrs = JSON.parse(`${{ needs.changes.outputs.attrs }}`);
            const suffixes = attrs.map((a) => (a === "image" ? "" : `-${a}`));
            const body = [
              marker,
              "### 📦 PR image builds",
              "",
              suffixes.length ? "Images rebuilt by this PR's latest push (path-filtered; others keep their previous tags):" : "No image inputs changed — nothing rebuilt.",
              "",
              "| image | tags |",
              "|---|---|",
              ...suffixes.map((s) => `| \`${base}${s}\` | \`pr-${pr}\`, \`${sha}\` |`),
              "",
              "```bash",
              ...suffixes.map((s) => `docker pull ${base}${s}:pr-${pr}`),
              "```",
              "",
              `Multi-arch (amd64/arm64). \`pr-${pr}\` tracks the latest push to this PR; the sha tag is immutable (built from the merge commit).`,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: pr, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body });
            }
