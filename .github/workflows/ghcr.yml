name: build and push to ghcr

# main pushes publish `latest` + `<sha>`; pull requests publish the same
# images under `pr-<number>` + `<sha>` tags and get a sticky PR comment with
# the pullable references. Fork PRs are skipped (no ghcr write access).
#
# Builds are minimal: a `changes` job maps changed paths to the images they
# feed, and only those images are (re)built. Unchanged images keep their
# previous tags (`latest`/`pr-N` simply don't advance for them). The
# languages overlays build FROM this run's sha tag when their base was
# rebuilt, else FROM `latest`.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Map changed paths -> images to rebuild. workflow_dispatch rebuilds all.
  changes:
    # PR builds need to push to ghcr, which fork PRs' tokens can't do.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      attrs: ${{ steps.plan.outputs.attrs }}
      base_rebuilt: ${{ steps.plan.outputs.base_rebuilt }}
      frontend_rebuilt: ${{ steps.plan.outputs.frontend_rebuilt }}
      languages: ${{ steps.plan.outputs.languages }}
      standalone_languages: ${{ steps.plan.outputs.standalone_languages }}
      languages_any: ${{ steps.plan.outputs.languages_any }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'flake.nix'
              - 'flake.lock'
              - 'codex-home/**'
              - 'policies/**'
              - '.github/workflows/ghcr.yml'
            client:
              - 'client/**'
            frontend:
              - 'frontend/**'
            slackbot:
              - 'slackbot/**'
            languages:
              - 'languages/**'
              - 'Dockerfile.languages'

      - name: plan builds
        id: plan
        env:
          CORE: ${{ steps.filter.outputs.core }}
          CLIENT: ${{ steps.filter.outputs.client }}
          FRONTEND: ${{ steps.filter.outputs.frontend }}
          SLACKBOT: ${{ steps.filter.outputs.slackbot }}
          LANGUAGES: ${{ steps.filter.outputs.languages }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CORE=true CLIENT=true FRONTEND=true SLACKBOT=true LANGUAGES=true
          fi
          # attr -> rebuild condition (rootfs/flake feed everything; the
          # bridge (client/) is in every supervisord image; frontend and
          # slackbot only in their variants).
          declare -A want=()
          [ "$CORE" = true ] && for a in image standalone standalone-frontend standalone-slack standalone-full slack-remote; do want[$a]=1; done
          [ "$CLIENT" = true ] && for a in standalone standalone-frontend standalone-slack standalone-full slack-remote; do want[$a]=1; done
          [ "$FRONTEND" = true ] && for a in standalone-frontend standalone-full; do want[$a]=1; done
          [ "$SLACKBOT" = true ] && for a in standalone-slack standalone-full slack-remote; do want[$a]=1; done
          attrs=$(for a in image standalone standalone-frontend standalone-slack standalone-full slack-remote; do
            [ -n "${want[$a]:-}" ] && echo "$a"; done | jq -R . | jq -sc .)
          base_rebuilt=$([ "$CORE" = true ] && echo true || echo false)
          frontend_rebuilt=$([ -n "${want[standalone-frontend]:-}" ] && echo true || echo false)
          languages=$([ "$LANGUAGES" = true ] || [ "$base_rebuilt" = true ] && echo true || echo false)
          standalone_languages=$([ "$LANGUAGES" = true ] || [ "$frontend_rebuilt" = true ] && echo true || echo false)
          languages_any=$([ "$languages" = true ] || [ "$standalone_languages" = true ] && echo true || echo false)
          {
            echo "attrs=$attrs"
            echo "base_rebuilt=$base_rebuilt"
            echo "frontend_rebuilt=$frontend_rebuilt"
            echo "languages=$languages"
            echo "standalone_languages=$standalone_languages"
            echo "languages_any=$languages_any"
          } | tee -a "$GITHUB_OUTPUT"

  build:
    needs: changes
    if: needs.changes.outputs.attrs != '[]'
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        # `image` pushes to ${IMAGE}; every other attr to ${IMAGE}-<attr>.
        attr: ${{ fromJson(needs.changes.outputs.attrs) }}
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # Two full Rust workspaces compile in the nix store; stock runners run
      # out of disk without this.
      - name: free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache /usr/share/dotnet /opt/ghc
          df -h /

      - uses: DeterminateSystems/nix-installer-action@v16

      # Cache /nix/store in the GitHub Actions cache, keyed on flake.lock.
      # On a lock hit the rust builds are skipped entirely and the job is
      # just image assembly + push. All attrs share one per-arch key (the
      # first finisher saves it; the rest hit it next run), and the two
      # arches share the repo's 10 GB cache budget, so keep each store
      # pruned under ~4.5 GB.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ matrix.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ matrix.arch }}-
          gc-max-store-size-linux: 4500M
          purge: true
          purge-prefixes: nix-${{ matrix.arch }}-
          purge-created: 0
          purge-primary-key: never

      - name: nix build + push image (skopeo)
        run: |
          attr="${{ matrix.attr }}"
          if [ "$attr" = image ]; then img="${IMAGE}"; else img="${IMAGE}-${attr}"; fi
          nix build ".#${attr}" --print-build-logs
          df -h /
          # streamLayeredImage output is a script that writes a docker-archive
          # tar to stdout; docker-archive sources must be seekable, so land it
          # in a file first.
          ./result > /tmp/nanocodex-image.tar
          # The runner ships a v1-format /etc/containers/registries.conf that
          # nix's skopeo refuses to parse — point it at a minimal v2 one, and
          # use --dest-creds instead of a login step (no auth-file handling).
          echo 'unqualified-search-registries = ["docker.io"]' > /tmp/registries.conf
          nix run nixpkgs#skopeo -- --registries-conf /tmp/registries.conf \
            copy --insecure-policy \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker-archive:/tmp/nanocodex-image.tar \
            "docker://${img}:${{ github.sha }}-${{ matrix.arch }}"

  manifest:
    needs: [changes, build]
    runs-on: ubuntu-latest
    steps:
      - name: assemble and push multi-arch manifest
        run: |
          # main: latest + sha; PR: pr-<n> (mutable, tracks the PR) + sha.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            tags="pr-${{ github.event.number }} ${{ github.sha }}"
          else
            tags="latest ${{ github.sha }}"
          fi
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          for attr in $(echo '${{ needs.changes.outputs.attrs }}' | jq -r '.[]'); do
            if [ "$attr" = image ]; then suffix=""; else suffix="-${attr}"; fi
            for tag in $tags; do
              podman manifest create "${IMAGE}${suffix}:${tag}"
              podman manifest add "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${{ github.sha }}-amd64"
              podman manifest add "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${{ github.sha }}-arm64"
              podman manifest push --all "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${tag}"
            done
          done

  # Language-toolbox variants: base images + the WASM engines from
  # languages/ (Dockerfile.languages). Plain docker builds — the layer only
  # adds /opt/languages assets, no nix involved. Two flavors:
  #   nanocodex-languages            — the plain base + engines
  #   nanocodex-standalone-languages — standalone-frontend + engines, with
  #                                    NANOCODEX_SANDBOX=languages and
  #                                    ollama-cloud/glm-5.2 defaults baked
  # Each flavor builds FROM this run's sha tag when its base was rebuilt
  # above, else FROM the published `latest`. `!failure() && !cancelled()`
  # because `build` is legitimately skipped on languages-only changes.
  build-languages:
    needs: [changes, build]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.languages_any == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: login to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: build and push
        run: |
          if [ "${{ needs.changes.outputs.languages }}" = "true" ]; then
            base="${IMAGE}:latest"
            [ "${{ needs.changes.outputs.base_rebuilt }}" = "true" ] && base="${IMAGE}:${{ github.sha }}-${{ matrix.arch }}"
            docker build -f Dockerfile.languages \
              --build-arg BASE_IMAGE="$base" \
              -t "${IMAGE}-languages:${{ github.sha }}-${{ matrix.arch }}" .
            docker push "${IMAGE}-languages:${{ github.sha }}-${{ matrix.arch }}"
          fi
          if [ "${{ needs.changes.outputs.standalone_languages }}" = "true" ]; then
            base="${IMAGE}-standalone-frontend:latest"
            [ "${{ needs.changes.outputs.frontend_rebuilt }}" = "true" ] && base="${IMAGE}-standalone-frontend:${{ github.sha }}-${{ matrix.arch }}"
            docker build -f Dockerfile.languages \
              --build-arg BASE_IMAGE="$base" \
              --build-arg SANDBOX_PRESET=languages \
              --build-arg MODEL_PROVIDER=ollama-cloud \
              --build-arg MODEL=glm-5.2 \
              -t "${IMAGE}-standalone-languages:${{ github.sha }}-${{ matrix.arch }}" .
            docker push "${IMAGE}-standalone-languages:${{ github.sha }}-${{ matrix.arch }}"
          fi

  manifest-languages:
    needs: [changes, build-languages]
    if: ${{ !failure() && !cancelled() && needs['build-languages'].result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: assemble and push multi-arch manifest
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            tags="pr-${{ github.event.number }} ${{ github.sha }}"
          else
            tags="latest ${{ github.sha }}"
          fi
          suffixes=""
          [ "${{ needs.changes.outputs.languages }}" = "true" ] && suffixes="$suffixes -languages"
          [ "${{ needs.changes.outputs.standalone_languages }}" = "true" ] && suffixes="$suffixes -standalone-languages"
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          for suffix in $suffixes; do
            for tag in $tags; do
              podman manifest create "${IMAGE}${suffix}:${tag}"
              podman manifest add "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${{ github.sha }}-amd64"
              podman manifest add "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${{ github.sha }}-arm64"
              podman manifest push --all "${IMAGE}${suffix}:${tag}" "docker://${IMAGE}${suffix}:${tag}"
            done
          done

  # Sticky PR comment listing the images this PR's latest push rebuilt
  # (updated in place on every push).
  pr-comment:
    if: ${{ always() && github.event_name == 'pull_request' && needs.changes.result == 'success' && !failure() && !cancelled() }}
    needs: [changes, manifest, manifest-languages]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- ghcr-pr-image-builds -->";
            const pr = context.issue.number;
            const sha = context.sha; // the PR's merge commit — what the jobs built
            const base = `ghcr.io/${context.repo.owner}/${context.repo.repo}`;
            const attrs = JSON.parse(`${{ needs.changes.outputs.attrs }}`);
            const suffixes = attrs.map((a) => (a === "image" ? "" : `-${a}`));
            if (`${{ needs.changes.outputs.languages }}` === "true") suffixes.push("-languages");
            if (`${{ needs.changes.outputs.standalone_languages }}` === "true") suffixes.push("-standalone-languages");
            const body = [
              marker,
              "### 📦 PR image builds",
              "",
              suffixes.length ? "Images rebuilt by this PR's latest push (path-filtered; others keep their previous tags):" : "No image inputs changed — nothing rebuilt.",
              "",
              "| image | tags |",
              "|---|---|",
              ...suffixes.map((s) => `| \`${base}${s}\` | \`pr-${pr}\`, \`${sha}\` |`),
              "",
              "```bash",
              ...suffixes.map((s) => `docker pull ${base}${s}:pr-${pr}`),
              "```",
              "",
              `Multi-arch (amd64/arm64). \`pr-${pr}\` tracks the latest push to this PR; the sha tag is immutable (built from the merge commit).`,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: pr, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body });
            }
