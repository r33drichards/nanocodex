# Ruff config for the whole repository. It governs every Python file across
# client/, integration/, frontend/e2e/, and the language skill scripts —
# client/pyproject.toml intentionally has no [tool.ruff] section, so Ruff walks
# up to this root config for all of them.
#
# Enforced in CI by .github/workflows/ci.yml (the `python` job: `ruff check`
# for lint, `ruff format --check` for formatting).

target-version = "py311"
line-length = 100

# Never lint or format generated code. The betterproto output under
# client/nanocodex_client/proto/ is regenerated by proto/generate.sh and is not
# hand-maintained. (Ruff already excludes .venv, node_modules, __pycache__,
# build/ and friends by default.)
extend-exclude = ["client/nanocodex_client/proto"]

[lint]
# E/F/W  — pycodestyle + pyflakes: real defects (unused/undefined names,
#          syntax errors, bare except, ambiguous names, …).
# I      — import sorting (isort), which the formatter does not do on its own.
# E501 (line-too-long) is deliberately left to the formatter, which owns line
# width; flagging it in lint just double-reports strings/URLs it can't wrap.
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[format]
# Ruff's defaults (double quotes, magic trailing commas, spaces) — this is the
# baseline the repository was formatted to when the tooling was adopted.
