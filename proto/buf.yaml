version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # Our enums intentionally use short value names (ALL/ANY, COMPLETED/...)
    # scoped by the enum name rather than a redundant prefix.
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    # RPCs intentionally reuse shared message types (TurnResult, Transcript,
    # google.protobuf.Struct) as responses rather than per-RPC wrappers.
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
