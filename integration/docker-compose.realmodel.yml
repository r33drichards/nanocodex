# Real-model variant: codex against the REAL Azure OpenAI provider (no
# fakemodel). For a manual/local smoke test of the AG-UI bridge with a live
# LLM — non-deterministic and needs a real key + spends tokens, so it is NOT a
# CI test. Uses the pinned published image (no rebuild) with the repo's Azure
# config.toml mounted over the baked one.
#
#   AZURE_OPENAI_API_KEY=... docker compose -f integration/docker-compose.realmodel.yml up -d --wait
#   # then point the bridge at ws://127.0.0.1:4520 and run smoke_realmodel.py

x-image: &image ghcr.io/r33drichards/nanocodex:d09737542e45304e0e6a303a9bde7046d81963f4

services:
  codex:
    image: *image
    container_name: nanocodex-realmodel-codex
    ports:
      - "4520:4500"
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:?set AZURE_OPENAI_API_KEY}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      # The repo's Azure-provider config (tool lockdown + memories off) over the
      # image's baked config.
      - ../codex-home/config.toml:/codex-home/config.toml:ro
      - ../secrets/ws-token:/run/secrets/ws_token:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4500/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
