# Global codex config for nanocodex: the model gets NO filesystem or
# command-exec tools. Its only capability is whatever MCP servers each thread
# declares in its `thread/start` config override (see client/demo.py) — for
# nanocodex that is a per-thread mcp-v8 JavaScript sandbox.

# Defense in depth on top of the disabled tools below.
approval_policy = "never"
sandbox_mode = "read-only"

# Model auth via API key env var — no `codex login` required.
# Default: Azure OpenAI (AZURE_OPENAI_API_KEY). Switch to "openai-api-key"
# to use api.openai.com with OPENAI_API_KEY instead, or "ollama-cloud" to
# use ollama.com with OLLAMA_API_KEY.
#
# The standalone supervisord images override these two keys at startup with
# `-c model_provider=$NANOCODEX_MODEL_PROVIDER -c model=$NANOCODEX_MODEL`
# (see flake.nix codexProgram), so there they are runtime env config; the
# values below are the defaults everywhere else.
model_provider = "azure"
model = "gpt-5.4"

[model_providers.azure]
name = "Azure OpenAI"
base_url = "https://codex-openai-service-671fb.openai.azure.com/openai"
env_key = "AZURE_OPENAI_API_KEY"
query_params = { api-version = "2025-04-01-preview" }
wire_api = "responses"

[model_providers.openai-api-key]
name = "OpenAI (API key)"
base_url = "https://api.openai.com/v1"
env_key = "OPENAI_API_KEY"
wire_api = "responses"

# Ollama Cloud (https://ollama.com), e.g. model = "glm-5.2". Must NOT be
# named "ollama" — that id is a codex built-in (local :11434) and built-ins
# win over configured providers. This fork only speaks the Responses wire
# API ("chat" was removed), which Ollama serves at /v1/responses.
[model_providers.ollama-cloud]
name = "Ollama Cloud"
base_url = "https://ollama.com/v1"
env_key = "OLLAMA_API_KEY"
wire_api = "responses"

[features]
# Kills the shell / unified-exec tool family.
shell_tool = false
# Fork additions: strip the remaining fs-touching built-in tools.
apply_patch_tool = false
view_image_tool = false
# No memory: disable startup memory extraction / file-backed consolidation
# and the passive screen-context memory sidecar.
memories = false
chronicle = false
# NOTE: codex's other built-in tools (task plan, goals, multi-agent, web/tool
# search, MCP-resource inspection) are left at their defaults — enabled — on
# purpose. Only the fs/exec tools are locked down; run_js is the primary
# execution surface but not the only tool. (TODO: make this set configurable.)
