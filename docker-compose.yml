services:
  codex:
    build: .
    image: nanocodex:latest
    ports:
      - "4500:4500"
    environment:
      # Model auth: consumed by the provider selected in codex-home/config.toml
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
    secrets:
      - ws_token
    volumes:
      # Persist thread history/state across restarts
      - codex-data:/codex-home/sqlite
      - codex-sessions:/codex-home/sessions
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4500/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # ALTERNATIVE instance on the nanocodex-languages image: base runtime plus
  # the WASM language engines at /opt/languages (see Dockerfile.languages).
  # Which image an instance runs is a deploy-time choice — this service is
  # behind a profile, so a plain `docker compose up` still runs only the base
  # instance. To deploy the languages instance (:4510) instead/as well:
  #   docker compose --profile languages up -d codex-languages
  # and point its bridge at it:
  #   NANOCODEX_URL=ws://127.0.0.1:4510 NANOCODEX_SANDBOX=languages
  codex-languages:
    profiles: ["languages"]
    build:
      context: .
      dockerfile: Dockerfile.languages
      # Layer on the locally built base image; compose builds `codex` first
      # (needs compose >= 2.22 — otherwise `docker compose build codex` first,
      # then build this with --build-arg BASE_IMAGE=nanocodex:latest).
      args:
        BASE_IMAGE: nanocodex-base
      additional_contexts:
        nanocodex-base: "service:codex"
    image: nanocodex-languages:latest
    ports:
      - "4510:4500"
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
    secrets:
      - ws_token
    volumes:
      - codex-languages-data:/codex-home/sqlite
      - codex-languages-sessions:/codex-home/sessions
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4500/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

secrets:
  ws_token:
    file: ./secrets/ws-token

volumes:
  codex-data:
  codex-sessions:
  codex-languages-data:
  codex-languages-sessions:
